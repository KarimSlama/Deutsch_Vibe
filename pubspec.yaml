name: deutsch_vibe
description: "Deutsch Vibe is a Flutter application designed to help users learn
  the German language through engaging content and interactive features."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  animate_do: ^4.2.0
  build_runner: ^2.4.15
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_gen_runner: ^5.10.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: null
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.1.0
  intl: ^0.20.2
  percent_indicator: ^4.2.5
  smooth_page_indicator: ^1.2.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true

  assets:
    - assets/logo/
    - assets/images/
    - assets/icons/
